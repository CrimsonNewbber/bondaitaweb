<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bondaita — Imagine. Create. Play.</title>
<link rel="icon" href="assets/icon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{
--primary:#00CC66;
--primary-dark:#00a352;
--primary-light:#5aff9d;
--secondary:#0066FF;
--accent:#FF6600;
--danger:#FF3333;
--warning:#FFB800;
--bg:#f5f7f8;
--surface:#ffffff;
--surface-2:#f0f2f5;
--surface-3:#e6e9ee;
--text-primary:#1a1a2e;
--text-secondary:#5a6175;
--text-tertiary:#9ca3af;
--border:#e5e7eb;
--navbar-bg:#ffffff;
--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
--shadow-lg:0 10px 30px rgba(0,0,0,.08);
--green-grad:linear-gradient(135deg,#00CC66 0%,#00994d 100%);
}
[data-theme="dark"]{
--bg:#0f0f1a;
--surface:#1a1a2e;
--surface-2:#252540;
--surface-3:#2d2d4a;
--text-primary:#e5e7eb;
--text-secondary:#9ca3af;
--text-tertiary:#6b7280;
--border:#2d2d4a;
--navbar-bg:#0a0a15;
--shadow:0 1px 3px rgba(0,0,0,.3);
--shadow-lg:0 10px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
a{color:var(--text-primary);text-decoration:none}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
img{max-width:100%;display:block}
.currency-icon{width:20px;height:20px;object-fit:contain;vertical-align:middle;display:inline-block}
.currency-icon-sm{width:16px;height:16px;object-fit:contain;vertical-align:middle;display:inline-block}
.currency-icon-lg{width:28px;height:28px;object-fit:contain;vertical-align:middle;display:inline-block}
.currency-icon-xl{width:44px;height:44px;object-fit:contain;vertical-align:middle;display:inline-block}
.brand-logo{width:36px;height:36px;border-radius:10px;background:var(--green-grad);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;flex-shrink:0}

#app{min-height:100vh;padding-top:64px}
.page{max-width:1200px;margin:0 auto;padding:24px 20px}
.page-narrow{max-width:420px;margin:0 auto}

/* Navbar */
#navbar{position:fixed;top:0;left:0;right:0;height:64px;background:var(--navbar-bg);border-bottom:1px solid var(--border);z-index:100;display:none;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;box-shadow:var(--shadow)}
#navbar.show{display:flex}
.nav-left,.nav-right{display:flex;align-items:center;gap:8px}
.nav-brand{font-weight:800;font-size:18px;display:flex;align-items:center;gap:10px;letter-spacing:-.3px}
.nav-brand img{width:36px;height:36px;border-radius:10px}
.nav-link{display:flex;align-items:center;gap:6px;color:var(--text-secondary);font-weight:600;font-size:14px;padding:8px 12px;border-radius:8px;transition:.15s}
.nav-link:hover{color:var(--text-primary);background:var(--surface-2)}
.nav-link.active{color:var(--primary);background:rgba(0,204,102,.1)}
.nav-chip{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:18px;background:var(--surface-2);font-size:13px;font-weight:700}
.nav-btn-primary{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:18px;background:var(--green-grad);color:#fff;font-weight:700;font-size:13px;transition:.15s}
.nav-btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,204,102,.3)}
.nav-icon-btn{position:relative;color:var(--text-secondary);padding:8px;border-radius:8px;transition:.15s}
.nav-icon-btn:hover{color:var(--text-primary);background:var(--surface-2)}
.nav-user{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;background:var(--surface-2);cursor:pointer;position:relative;font-weight:600;font-size:13px}
.nav-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.badge{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:200px;display:none;box-shadow:var(--shadow-lg);z-index:10}
.dropdown.show{display:block}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:14px;cursor:pointer;color:var(--text-primary);transition:.15s}
.dropdown-item:hover{background:var(--surface-2)}
.dropdown-item.danger{color:var(--danger)}
.mobile-toggle{display:none;color:var(--text-primary);padding:8px;border-radius:8px}
.mobile-toggle:hover{background:var(--surface-2)}
#mobile-menu{position:fixed;top:0;right:-300px;width:300px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:200;padding:20px;transition:right .25s;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
#mobile-menu.open{right:0}
#mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:none}
#mobile-overlay.show{display:block}

@media(max-width:768px){
.nav-link,.nav-chip,.nav-btn-primary{display:none}
.mobile-toggle{display:flex}
}

/* Cards & containers */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.card:hover{box-shadow:var(--shadow-lg)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;transition:.15s;border:none;white-space:nowrap}
.btn-primary{background:var(--green-grad);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,204,102,.3)}
.btn-secondary{background:var(--surface-2);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface-3)}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text-primary)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-icon{padding:8px;border-radius:8px}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:14px 28px;font-size:16px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-primary);font-size:14px;transition:.15s}
.form-input:focus{border-color:var(--primary);outline:none}
textarea.form-input{resize:vertical;min-height:80px}
[data-theme="dark"] .form-input{background:var(--surface-2)}

/* Toast */
#toast-container{position:fixed;top:80px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:10px;padding:12px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:14px;animation:toastIn .25s;backdrop-filter:blur(8px)}
.toast.out{animation:toastOut .25s forwards}
.toast.error{border-left-color:var(--danger)}
.toast.info{border-left-color:var(--secondary)}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{to{transform:translateX(100%);opacity:0}}

/* Modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
#modal.show{display:flex}
.modal-box{background:var(--surface);border-radius:16px;padding:24px;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;animation:scaleIn .2s;box-shadow:var(--shadow-lg)}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.modal-header h3{font-size:18px;font-weight:800}
.modal-close{color:var(--text-tertiary);padding:6px;border-radius:6px}
.modal-close:hover{color:var(--text-primary);background:var(--surface-2)}

/* Grids */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}

/* Game card */
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.game-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.game-thumb{height:130px;position:relative;display:flex;align-items:flex-end;padding:10px}
.game-badge{background:rgba(0,0,0,.7);color:#fff;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px)}
.game-info{padding:12px}
.game-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-meta{font-size:12px;color:var(--text-secondary);margin-top:2px}

/* Item card */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.item-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.item-thumb{aspect-ratio:1;position:relative}
.item-info{padding:12px}
.item-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:13px;font-weight:800;display:flex;align-items:center;gap:4px;margin-top:4px;color:var(--primary)}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 16px;font-size:14px;font-weight:600;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;cursor:pointer;transition:.15s}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Utility */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.text-center{text-align:center}.text-sm{font-size:13px}.text-xs{font-size:12px}.text-lg{font-size:18px}.text-xl{font-size:24px}.text-2xl{font-size:32px}
.font-bold{font-weight:700}.font-semibold{font-weight:600}
.text-secondary{color:var(--text-secondary)}.text-tertiary{color:var(--text-tertiary)}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.p-4{padding:16px}.p-6{padding:24px}
.w-full{width:100%}.hidden{display:none!important}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);display:inline-block;flex-shrink:0}
.row-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}

/* Landing */
.landing-nav{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:50;background:rgba(245,247,248,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.landing-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 20px 80px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(180deg,var(--bg) 0%,var(--surface-2) 100%)}
.landing-hero::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(0,204,102,.15),transparent 60%);pointer-events:none}
.landing-hero>div{position:relative;z-index:1;max-width:720px}
.landing h1{font-size:clamp(36px,6vw,60px);font-weight:900;line-height:1.05;margin-bottom:16px;letter-spacing:-1.5px}
.landing h1 span{background:var(--green-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.landing p{font-size:clamp(16px,2vw,19px);color:var(--text-secondary);max-width:560px;margin:0 auto 32px;line-height:1.6}
.landing-cta{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.landing-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:20px;max-width:600px;margin:60px auto 0;padding-top:40px;border-top:1px solid var(--border)}
.landing-stat-num{font-size:28px;font-weight:900;color:var(--primary)}
.landing-section{padding:80px 20px;background:var(--surface)}
.landing-footer{padding:40px 20px;border-top:1px solid var(--border);text-align:center;color:var(--text-secondary);font-size:14px}
.feature-card{text-align:center;padding:32px 20px}
.feature-icon{width:56px;height:56px;border-radius:14px;background:rgba(0,204,102,.1);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}

/* Currency page */
.balance-card{display:flex;align-items:center;gap:16px;padding:20px;border-radius:14px;background:var(--surface);border:1px solid var(--border)}
.balance-amount{font-size:32px;font-weight:900;line-height:1}
.exchange-box{background:var(--surface);border:2px solid var(--primary);border-radius:16px;padding:24px;position:relative;overflow:hidden}
.exchange-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green-grad)}
.quick-btn{padding:8px 12px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);font-size:12px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.quick-btn:hover:not(:disabled){border-color:var(--primary);background:rgba(0,204,102,.08)}
.quick-btn:disabled{opacity:.4;cursor:not-allowed}

/* Profile */
.profile-banner{height:160px;border-radius:14px;margin-bottom:-50px;position:relative;overflow:hidden}
.profile-avatar-lg{width:100px;height:100px;border-radius:50%;border:4px solid var(--bg);margin-left:24px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:900;position:relative;z-index:2}

/* Messages */
.msg-layout{display:flex;height:calc(100vh - 110px);border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--surface)}
.msg-list{width:300px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.msg-row{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.msg-row:hover,.msg-row.active{background:var(--surface-2)}
.msg-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.msg-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4;word-wrap:break-word}
.msg-bubble.sent{background:var(--primary);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg-bubble.received{background:var(--surface-2);border-bottom-left-radius:4px}

/* Avatar */
.avatar-preview{width:220px;height:300px;border-radius:14px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto}
.color-swatch{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.15s}
.color-swatch.active{border-color:var(--text-primary);transform:scale(1.1)}
.color-swatch:hover{transform:scale(1.1)}

@media(max-width:768px){
.grid-2,.grid-3{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
.msg-list{width:100%}
.msg-panel{display:none}
.msg-layout.chat-open .msg-list{display:none}
.msg-layout.chat-open .msg-panel{display:flex}
.profile-banner{height:120px;margin-bottom:-40px}
.profile-avatar-lg{width:80px;height:80px;font-size:24px;margin-left:16px}
}
</style>
</head>
<body>
<nav id="navbar"></nav>
<div id="mobile-overlay" onclick="closeMobileMenu()"></div>
<div id="mobile-menu"></div>
<div id="app"></div>
<div id="toast-container"></div>
<div id="modal" onclick="if(event.target===this)closeModal()"></div>

<script>
/* ============= ICONS ============= */
const svg=(paths,fill=false)=>`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="${fill?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
const Icons={
home:()=>svg('<path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><polyline points="9 22 9 12 15 12 15 22"/>'),
gamepad:()=>svg('<rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 9h.01M10 9h.01M14 9h.01M18 9h.01M8 15h8"/>'),
catalog:()=>svg('<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>'),
create:()=>svg('<path d="M12 5v14M5 12h14"/>'),
avatar:()=>svg('<circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0112 0v1"/>'),
search:()=>svg('<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>'),
user:()=>svg('<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>'),
users:()=>svg('<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>'),
message:()=>svg('<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>'),
group:()=>svg('<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>'),
settings:()=>svg('<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>'),
exchange:()=>svg('<polyline points="17 1 21 5 17 9"/><line x1="3" y1="5" x2="21" y2="5"/><polyline points="7 23 3 19 7 15"/><line x1="21" y1="19" x2="3" y2="19"/>'),
bell:()=>svg('<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>'),
logout:()=>svg('<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>'),
play:()=>svg('<polygon points="5 3 19 12 5 21 5 3"/>',true),
like:()=>svg('<path d="M14 9V5a3 3 0 00-6 0v1H5a2 2 0 00-2 2v1l1.5 8A2 2 0 006.5 19H14a2 2 0 002-2V9z"/><path d="M18 9h2a2 2 0 012 2v7a2 2 0 01-2 2h-2V9z"/>'),
favorite:()=>svg('<path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>'),
share:()=>svg('<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>'),
close:()=>svg('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'),
plus:()=>svg('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'),

/* ============= ROUTER ============= */
const routes={};
function route(path,fn){routes[path]=fn}
function navigate(hash){window.location.hash=hash}
window.navigate=navigate;

function matchRoute(hash){
const path=hash.replace('#','')||'/';
if(routes[path])return{fn:routes[path],params:{}};
for(let r in routes){
const rp=r.split('/'),pp=path.split('/');
if(rp.length!==pp.length)continue;
const params={};let ok=true;
for(let i=0;i<rp.length;i++){
if(rp[i].startsWith(':'))params[rp[i].slice(1)]=pp[i];
else if(rp[i]!==pp[i]){ok=false;break}
}
if(ok)return{fn:routes[r],params};
}
return null;
}

function render(){
const hash=window.location.hash||'#/';
const path=hash.replace('#','');
const authPrefixes=['/discover','/game/','/profile/','/avatar','/catalog','/friends','/messages','/groups','/create','/settings','/currency','/search','/notifications'];
if(!currentUser&&authPrefixes.some(p=>path.startsWith(p))){navigate('#/login');return}
if(currentUser&&(path==='/login'||path==='/signup')){navigate('#/discover');return}
const m=matchRoute(hash);
if(m){renderNav();m.fn(m.params)}
else render404();
}
window.addEventListener('hashchange',render);

function addDailyBonus(){
const today=nowIso();
if(userData.lastLoginDate===today)return;
const yest=new Date(Date.now()-86400000).toISOString().split('T')[0];
if(userData.lastLoginDate===yest)userData.loginStreak++;else userData.loginStreak=1;
let bonus=10;
if(userData.loginStreak%7===0)bonus+=50;
userData.studs+=bonus;
userData.lastLoginDate=today;
userData.transactions=userData.transactions||[];
userData.transactions.unshift({type:'earning',curr:'studs',desc:`Daily login (day ${userData.loginStreak})`,amount:bonus,bal:userData.studs,time:Date.now()});
currencyToast(`+${bonus} Studs! 🔥 ${userData.loginStreak}-day streak`,'success','studs');
}
