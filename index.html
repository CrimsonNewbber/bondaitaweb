<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bondaita — Imagine. Create. Play.</title>
<link rel="icon" href="assets/icon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--primary:#0066FF;--secondary:#00CC66;--accent:#FF6600;--danger:#FF3333;--warning:#FFB800;
--bg:#F2F4F7;--surface:#FFFFFF;--surface-2:#E8EBF0;
--text-primary:#1A1A2E;--text-secondary:#6B7280;--text-tertiary:#9CA3AF;
--border:#E5E7EB;--navbar-bg:#1A1A2E;
--radius:12px;--radius-sm:8px;--radius-lg:16px;
--shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
--transition:0.2s ease;
}
[data-theme="dark"]{
--bg:#0F0F1A;--surface:#1A1A2E;--surface-2:#252540;
--text-primary:#E5E7EB;--text-secondary:#9CA3AF;--text-tertiary:#6B7280;
--border:#2D2D4A;--navbar-bg:#0A0A15;
--shadow:0 2px 8px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;transition:background var(--transition),color var(--transition)}
a{color:var(--primary);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,textarea,select{font-family:inherit;outline:none}
img{max-width:100%}
.currency-icon{width:20px;height:20px;object-fit:contain;vertical-align:middle;display:inline-block}
.currency-icon-sm{width:16px;height:16px;object-fit:contain;vertical-align:middle;display:inline-block}
.currency-icon-lg{width:28px;height:28px;object-fit:contain;vertical-align:middle;display:inline-block}
.currency-icon-xl{width:40px;height:40px;object-fit:contain;vertical-align:middle;display:inline-block}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}

/* Loading Bar */
#loading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));z-index:10000;transition:width 0.3s;width:0}
#loading-bar.active{width:70%}
#loading-bar.done{width:100%;opacity:0;transition:width 0.2s,opacity 0.3s 0.2s}

/* Full page loader */
#full-loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s}
#full-loader.hidden{opacity:0;pointer-events:none}
.loader-spinner{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Navbar */
#navbar{position:fixed;top:0;left:0;right:0;height:60px;background:var(--navbar-bg);z-index:1000;display:none;align-items:center;padding:0 20px;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
#navbar.show{display:flex}
.nav-brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;font-size:18px;text-decoration:none;flex-shrink:0}
.nav-brand img{width:32px;height:32px;border-radius:6px}
.nav-brand-text{background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:4px;flex-shrink:0}
.nav-link{display:flex;align-items:center;gap:6px;color:#ffffffb3;padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all var(--transition);text-decoration:none;white-space:nowrap}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,0.1)}
.nav-search{flex:1;max-width:400px;position:relative;margin:0 16px}
.nav-search input{width:100%;padding:8px 36px 8px 36px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:13px;transition:all var(--transition)}
.nav-search input::placeholder{color:rgba(255,255,255,0.4)}
.nav-search input:focus{background:rgba(255,255,255,0.12);border-color:var(--primary)}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4)}
.nav-right{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0}
.nav-currency{display:flex;align-items:center;gap:4px;color:#fff;font-size:13px;font-weight:600;padding:4px 8px;border-radius:var(--radius-sm);background:rgba(255,255,255,0.08)}
.nav-exchange-btn{display:flex;align-items:center;gap:4px;background:var(--secondary);color:#fff;padding:6px 10px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;transition:all var(--transition)}
.nav-exchange-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.nav-bell{position:relative;color:#ffffffb3;padding:6px;border-radius:50%;background:transparent;transition:all var(--transition)}
.nav-bell:hover{color:#fff;background:rgba(255,255,255,0.1)}
.nav-bell .badge{position:absolute;top:0;right:0;background:var(--danger);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nav-user{display:flex;align-items:center;gap:8px;color:#fff;padding:4px 8px;border-radius:var(--radius-sm);cursor:pointer;position:relative;background:transparent;transition:all var(--transition)}
.nav-user:hover{background:rgba(255,255,255,0.1)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.nav-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);min-width:220px;z-index:100;display:none;overflow:hidden}
.nav-dropdown.show{display:block}
.nav-dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--text-primary);font-size:14px;transition:background var(--transition);cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nav-dropdown-item:hover{background:var(--surface-2)}
.nav-dropdown-divider{height:1px;background:var(--border);margin:4px 0}

/* Mobile nav */
.nav-mobile-toggle{display:none;color:#fff;background:none;padding:6px}
@media(max-width:900px){
.nav-links,.nav-search,.nav-currency,.nav-exchange-btn{display:none!important}
.nav-mobile-toggle{display:block}
}
#mobile-sidebar{position:fixed;top:0;left:-300px;width:300px;height:100vh;background:var(--surface);z-index:2000;transition:left 0.3s;overflow-y:auto;box-shadow:var(--shadow-lg)}
#mobile-sidebar.open{left:0}
#mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1999;display:none}
#mobile-overlay.show{display:block}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-currencies{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;gap:16px}
.sidebar-curr{display:flex;align-items:center;gap:6px;font-weight:600;font-size:14px}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--text-primary);font-size:15px;transition:background var(--transition)}
.sidebar-link:hover{background:var(--surface-2)}

/* Toast */
#toast-container{position:fixed;top:72px;right:20px;z-index:5000;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:toastIn 0.3s;max-width:380px;font-size:14px}
.toast.out{animation:toastOut 0.3s forwards}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{opacity:1}to{transform:translateX(100%);opacity:0}}
.toast-icon{flex-shrink:0}
.toast-success .toast-icon{color:var(--secondary)}
.toast-error .toast-icon{color:var(--danger)}
.toast-warning .toast-icon{color:var(--warning)}
.toast-info .toast-icon{color:var(--primary)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-width:500px;width:100%;max-height:90vh;overflow-y:auto;transform:scale(0.9);transition:transform 0.2s;padding:24px}
.modal-overlay.show .modal{transform:scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{background:none;color:var(--text-secondary);padding:4px;border-radius:6px;transition:all var(--transition)}
.modal-close:hover{background:var(--surface-2);color:var(--text-primary)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:all var(--transition);border:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-secondary{background:var(--surface-2);color:var(--text-primary)}
.btn-secondary:hover{background:var(--border)}
.btn-success{background:var(--secondary);color:#fff}
.btn-success:hover{filter:brightness(1.1)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.1)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text-primary)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:14px 28px;font-size:16px}
.btn-icon{padding:8px;border-radius:var(--radius-sm)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all var(--transition)}
.card:hover{box-shadow:var(--shadow)}

/* Forms */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.form-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-primary);font-size:14px;transition:border-color var(--transition)}
.form-input:focus{border-color:var(--primary)}
.form-input.error{border-color:var(--danger)}
.form-error{font-size:12px;color:var(--danger);margin-top:4px}
.form-hint{font-size:12px;color:var(--text-tertiary);margin-top:4px}
textarea.form-input{resize:vertical;min-height:80px}
select.form-input{cursor:pointer}

/* Tabs */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:14px;font-weight:500;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap;transition:all var(--transition);background:none}
.tab:hover{color:var(--text-primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Game Cards */
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all var(--transition)}
.game-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.game-card-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden}
.game-card-info{padding:12px}
.game-card-title{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-card-meta{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px}

/* Game Row */
.game-row{margin-bottom:28px}
.game-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.game-row-title{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700}
.game-row-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.game-row-scroll::-webkit-scrollbar{display:none}
.game-row-scroll .game-card{min-width:200px;max-width:200px;flex-shrink:0}
.scroll-btn{background:var(--surface);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text-primary);transition:all var(--transition);flex-shrink:0}
.scroll-btn:hover{background:var(--surface-2)}

/* Item Cards */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all var(--transition)}
.item-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.item-card-thumb{width:100%;aspect-ratio:1;position:relative}
.item-card-info{padding:12px}
.item-card-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-card-price{font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px}

/* Grids */
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.grid-5{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}

/* Page container */
#app{min-height:100vh}
.page{padding:80px 20px 40px;max-width:1200px;margin:0 auto}
.page-wide{max-width:1400px}

/* Offline banner */
#offline-banner{position:fixed;bottom:0;left:0;right:0;background:var(--danger);color:#fff;padding:10px;text-align:center;font-size:14px;font-weight:600;z-index:4000;display:none;align-items:center;justify-content:center;gap:8px}
#offline-banner.show{display:flex}

/* Password strength */
.pw-strength{height:4px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden}
.pw-strength-bar{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s}

/* Avatar Preview */
.avatar-preview{width:200px;height:280px;border-radius:var(--radius);background:var(--surface-2);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid var(--border);margin:0 auto}

/* Messages */
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg-bubble.sent{background:var(--primary);color:#fff;border-bottom-right-radius:4px;margin-left:auto}
.msg-bubble.received{background:var(--surface-2);color:var(--text-primary);border-bottom-left-radius:4px}

/* Utility */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}
.text-center{text-align:center}.text-sm{font-size:13px}.text-xs{font-size:12px}.text-lg{font-size:18px}.text-xl{font-size:24px}.text-2xl{font-size:32px}.text-3xl{font-size:40px}
.font-bold{font-weight:700}.font-semibold{font-weight:600}.font-medium{font-weight:500}
.text-secondary{color:var(--text-secondary)}.text-tertiary{color:var(--text-tertiary)}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-8{margin-top:32px}
.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.p-4{padding:16px}.p-6{padding:24px}
.w-full{width:100%}
.hidden{display:none!important}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--secondary);display:inline-block;flex-shrink:0}
.offline-dot{width:10px;height:10px;border-radius:50%;background:var(--text-tertiary);display:inline-block;flex-shrink:0}

/* Landing page */
.landing-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;background:linear-gradient(135deg,#0a0a15 0%,#1a1a2e 50%,#0f0f2a 100%);color:#fff;position:relative;overflow:hidden}
.landing-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(0,102,255,0.15),transparent 50%),radial-gradient(circle at 70% 60%,rgba(0,204,102,0.1),transparent 50%)}
.landing-hero h1{font-size:clamp(36px,6vw,72px);font-weight:900;margin-bottom:16px;line-height:1.1}
.landing-hero .tagline{font-size:clamp(18px,2.5vw,28px);color:rgba(255,255,255,0.7);margin-bottom:40px}
.landing-features{padding:80px 20px;background:var(--bg)}
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center;transition:all var(--transition)}
.feature-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg)}
.feature-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff}
.landing-stats{padding:60px 20px;background:var(--navbar-bg);color:#fff;text-align:center}
.stat-number{font-size:36px;font-weight:900}
.landing-footer{padding:40px 20px;background:var(--navbar-bg);color:rgba(255,255,255,0.6);border-top:1px solid rgba(255,255,255,0.1)}

/* Insufficient Bonds Modal */
.insuff-modal .balance-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:8px}
.insuff-modal .balance-row .amount{font-size:20px;font-weight:700}
.insuff-modal .need-info{background:var(--warning);color:#1a1a2e;padding:12px;border-radius:var(--radius-sm);margin:16px 0;font-weight:600;text-align:center}

/* Genre sidebar */
.genre-sidebar{width:220px;flex-shrink:0;position:sticky;top:76px;max-height:calc(100vh - 96px);overflow-y:auto}
.genre-link{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:14px;transition:all var(--transition);cursor:pointer}
.genre-link:hover,.genre-link.active{background:var(--surface);color:var(--primary);font-weight:600}
@media(max-width:768px){.genre-sidebar{display:none}.discover-layout{flex-direction:column!important}}

/* Settings sidebar */
.settings-layout{display:flex;gap:24px}
.settings-sidebar{width:220px;flex-shrink:0}
.settings-nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:14px;cursor:pointer;transition:all var(--transition);background:none;border:none;width:100%;text-align:left}
.settings-nav-item:hover,.settings-nav-item.active{background:var(--surface);color:var(--primary);font-weight:600}
.settings-content{flex:1;min-width:0}
@media(max-width:768px){.settings-layout{flex-direction:column}.settings-sidebar{width:100%;display:flex;overflow-x:auto;gap:4px}}

/* Exchange page */
.exchange-card{background:linear-gradient(135deg,var(--surface),var(--surface-2));border:2px solid var(--primary);border-radius:var(--radius-lg);padding:32px}
.exchange-preview{display:flex;align-items:center;gap:12px;padding:16px;background:var(--surface);border-radius:var(--radius);font-size:18px;font-weight:700;justify-content:center;margin:16px 0}
.quick-exchange-btns{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.quick-exchange-btn{padding:8px 16px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:600;transition:all var(--transition);display:flex;align-items:center;gap:4px}
.quick-exchange-btn:hover{border-color:var(--primary);background:rgba(0,102,255,0.08)}

/* Transaction History */
.tx-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border);font-size:14px}
.tx-row:last-child{border-bottom:none}
.tx-amount{font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tx-amount.positive{color:var(--secondary)}
.tx-amount.negative{color:var(--danger)}

/* Profile */
.profile-banner{height:200px;border-radius:var(--radius-lg);position:relative;overflow:hidden;margin-bottom:-60px}
.profile-avatar{width:120px;height:120px;border-radius:50%;border:4px solid var(--surface);position:relative;z-index:2;margin-left:24px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;color:#fff}
.profile-stats{display:flex;gap:24px;flex-wrap:wrap}
.profile-stat{text-align:center}
.profile-stat-num{font-size:20px;font-weight:700}
.profile-stat-label{font-size:12px;color:var(--text-secondary)}

/* Messages layout */
.messages-layout{display:flex;height:calc(100vh - 100px);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface)}
.msg-list{width:320px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.msg-list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background var(--transition);border-bottom:1px solid var(--border)}
.msg-list-item:hover,.msg-list-item.active{background:var(--surface-2)}
.msg-panel{flex:1;display:flex;flex-direction:column}
.msg-panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600}
.msg-panel-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg-panel-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.msg-panel-footer input{flex:1}
@media(max-width:768px){.msg-list{width:100%}.msg-panel{display:none}.messages-layout.chat-open .msg-list{display:none}.messages-layout.chat-open .msg-panel{display:flex}}

/* Comment */
.comment{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.comment-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}

/* Group Wall */
.wall-post{display:flex;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>

}

// ==================== ROUTER ====================
const routes={};
function route(path,handler){routes[path]=handler}
function navigate(hash){window.location.hash=hash}

function matchRoute(hash){
const path=hash.replace('#','');
if(routes[path])return{handler:routes[path],params:{}};
for(const r in routes){
const rParts=r.split('/');
const pParts=path.split('/');
if(rParts.length!==pParts.length)continue;
const params={};let match=true;
for(let i=0;i<rParts.length;i++){
if(rParts[i].startsWith(':')){params[rParts[i].slice(1)]=pParts[i]}
else if(rParts[i]!==pParts[i]){match=false;break}
}
if(match)return{handler:routes[r],params};
}
return null;
}

const authRoutes=['/discover','/game/','/profile/','/avatar','/catalog','/friends','/messages','/groups','/create','/settings','/currency','/search','/notifications'];
const publicRoutes=['/','/login','/signup','/404'];

async function handleRoute(){
showLoading();
const hash=window.location.hash||'#/';
const path=hash.replace('#','');

if(!currentUser&&authRoutes.some(r=>path.startsWith(r))){
navigate('#/login');hideLoading();return;
}
if(currentUser&&(path==='/login'||path==='/signup')){
navigate('#/discover');hideLoading();return;
}
if(currentUser&&path==='/'){
navigate('#/discover');hideLoading();return;
}

const matched=matchRoute(hash);
if(matched){
$('navbar').className=currentUser?'show':'';
renderNav();
await matched.handler(matched.params);
}else{
render404();
}
hideLoading();
}

window.addEventListener('hashchange',handleRoute);

async function checkDailyLogin(){
if(!currentUser||!userData)return;
const today=new Date().toISOString().split('T')[0];
if(userData.lastLoginDate===today)return;

const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
let streak=userData.loginStreak||0;
let bonus=10;

if(userData.lastLoginDate===yesterday){
streak++;
if(streak%7===0)bonus+=50;
}else{
streak=1;
}

const ref=doc(db,'users',currentUser.uid);
try{
await updateDoc(ref,{
lastLoginDate:today,
loginStreak:streak,
studs:increment(bonus),
lastOnline:serverTimestamp(),
isOnline:true
});
currencyToast(`+${bonus} Studs from daily login!${streak%7===0?' (+50 streak bonus!)':''}${streak>1?` 🔥 ${streak} day streak!`:''}`,
'success','studs');
await addDoc(collection(db,'users',currentUser.uid,'transactions'),{
type:'earning',currencyType:'studs',description:`Daily login bonus${streak%7===0?' + 7-day streak bonus':''}`,
amount:bonus,balanceAfter:(userData.studs||0)+bonus,timestamp:serverTimestamp()
});
}catch(e){console.error('Daily login error:',e)}
}

try{
const ref=doc(db,'users',currentUser.uid);
await updateDoc(ref,{studs:increment(-studs),bonds:increment(bonds)});
await addDoc(collection(db,'users',currentUser.uid,'transactions'),{
type:'exchange_out',currencyType:'studs',description:`Exchanged ${studs} Studs for ${bonds} Bonds`,
amount:-studs,balanceAfter:(userData.studs||0)-studs,timestamp:serverTimestamp()
});
await addDoc(collection(db,'users',currentUser.uid,'transactions'),{
type:'exchange_in',currencyType:'bonds',description:`Received ${bonds} Bonds from exchange`,
amount:bonds,balanceAfter:(userData.bonds||0)+bonds,timestamp:serverTimestamp()
});
currencyToast(`${studs} Studs exchanged for ${bonds} Bonds!`,'success','bonds');
setTimeout(()=>handleRoute(),500);
}catch(err){toast(err.message,'error')}
};

window.demoBuyBonds=async(amt)=>{
try{
await updateDoc(doc(db,'users',currentUser.uid),{bonds:increment(amt)});
await addDoc(collection(db,'users',currentUser.uid,'transactions'),{
type:'purchase',currencyType:'bonds',description:`Demo purchase: ${amt} Bonds`,
amount:amt,balanceAfter:(userData.bonds||0)+amt,timestamp:serverTimestamp()
});
currencyToast(`+${amt} Bonds added (demo)!`,'success','bonds');
setTimeout(()=>handleRoute(),500);
}catch(err){toast(err.message,'error')}
};

async function loadTransactions(){
if(!currentUser)return;
const list=$('tx-list');if(!list)return;
try{
const q2=query(collection(db,'users',currentUser.uid,'transactions'),orderBy('timestamp','desc'),limit(20));
const snap=await getDocs(q2);
if(snap.empty){list.innerHTML='<p class="text-center p-6 text-secondary">No transactions yet.</p>';return}
list.innerHTML=snap.docs.map(d=>{
const tx=d.data();
const isPositive=tx.amount>0;
const icon=tx.currencyType==='bonds'?'<img src="assets/bond.png" alt="Bonds" class="currency-icon-sm">':'<img src="assets/stud.png" alt="Studs" class="currency-icon-sm">';
return`<div class="tx-row">
${icon}
<div style="flex:1"><div class="text-sm">${tx.description}</div><div class="text-xs text-tertiary">${tx.timestamp?timeAgo(tx.timestamp):''}</div></div>
<div class="tx-amount ${isPositive?'positive':'negative'}">${isPositive?'+':''}${tx.amount}</div>
</div>`;
}).join('');
}catch(err){list.innerHTML=`<p class="text-center p-6 text-secondary">Could not load transactions.</p>`}
}

<div class="grid-4">
${games.map(g=>`<div class="game-card" onclick="navigate('#/game/${g.id}')"><div class="game-card-thumb" style="background:${g.thumbnailGrad}"><div style="position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px">${formatNum(g.activePlayers)} playing</div></div><div class="game-card-info"><div class="game-card-title">${g.title}</div><div class="game-card-meta">${g.creatorName} · ${g.genre}</div></div></div>`).join('')}

// NOTIFICATIONS
route('/notifications',async()=>{
$('app').innerHTML=`
<div class="page fade-in">
<div class="flex justify-between items-center mb-6">
<h2 class="text-xl font-bold">${Icons.bell()} Notifications</h2>
<button class="btn btn-secondary btn-sm" onclick="markAllRead()">${Icons.check()} Mark all read</button>
</div>
<div id="notif-list">Loading...</div>
</div>`;
loadNotifications();
});

async function loadNotifications(){
if(!currentUser)return;
const list=$('notif-list');if(!list)return;
try{
const q2=query(collection(db,'users',currentUser.uid,'notifications'),orderBy('timestamp','desc'),limit(30));
const snap=await getDocs(q2);
if(snap.empty){list.innerHTML='<div class="text-center p-6 text-secondary">No notifications yet.</div>';return}
list.innerHTML=snap.docs.map(d=>{
const n=d.data();
const iconMap={welcome:Icons.sparkle(),friend_request:Icons.addFriend(),message:Icons.message(),achievement:Icons.achievement(),system:Icons.info()};
return`<div class="card mb-2 flex items-center gap-3" style="padding:14px;${n.read?'opacity:0.6':'border-left:3px solid var(--primary)'}">
<div style="color:var(--primary)">${iconMap[n.type]||Icons.bell()}</div>
<div style="flex:1"><div class="font-semibold text-sm">${n.title||'Notification'}</div><div class="text-xs text-secondary">${n.message||''}</div><div class="text-xs text-tertiary mt-1">${n.timestamp?timeAgo(n.timestamp):''}</div></div>
${n.type==='friend_request'&&!n.read?`<div class="flex gap-2"><button class="btn btn-success btn-sm">${Icons.check()}</button><button class="btn btn-secondary btn-sm">${Icons.close()}</button></div>`:''}
</div>`;
}).join('');
}catch(err){list.innerHTML='<div class="text-center p-6 text-secondary">Could not load notifications.</div>'}
}

window.markAllRead=async()=>{
toast('All notifications marked as read','success');
handleRoute();
};

// ==================== AUTH LISTENER ====================
onAuthStateChanged(auth,async(user)=>{
currentUser=user;
if(user){
// Listen to user data
if(unsubUserData)unsubUserData();
unsubUserData=onSnapshot(doc(db,'users',user.uid),(snap)=>{
if(snap.exists()){
userData=snap.data();
// Update navbar currencies
const nb=$('nav-bonds');if(nb)nb.textContent=formatNum(userData.bonds||0);
const ns=$('nav-studs');if(ns)ns.textContent=formatNum(userData.studs||0);
}
});
// Listen to notifications
if(unsubNotifs)unsubNotifs();
unsubNotifs=onSnapshot(query(collection(db,'users',user.uid,'notifications'),where('read','==',false)),(snap)=>{
const badge=$('notif-badge');
if(badge){
const count=snap.size;
badge.textContent=count;
badge.style.display=count>0?'flex':'none';
}
});
// Wait for userData
const userSnap=await getDoc(doc(db,'users',user.uid));
if(userSnap.exists())userData=userSnap.data();
// Check daily login
await checkDailyLogin();
}else{
userData=null;
if(unsubNotifs){unsubNotifs();unsubNotifs=null}
if(unsubUserData){unsubUserData();unsubUserData=null}
}
$('full-loader').classList.add('hidden');
handleRoute();
});

// Offline detection
window.addEventListener('online',()=>{$('offline-banner').classList.remove('show')});
window.addEventListener('offline',()=>{
const ob=$('offline-banner');
ob.innerHTML=`${Icons.wifiOff()} You are offline. Some features may not work.`;
ob.classList.add('show');
});

// Close dropdown on outside click
document.addEventListener('click',e=>{
if(!e.target.closest('.nav-user')){
const d=$('nav-dropdown');if(d)d.classList.remove('show');
}
});
</script>
