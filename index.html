<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Tracking Layout</title>
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #ffffff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }

    .container {
        position: relative;
        width: 900px;
        height: 600px;
    }

    /* Styling the image placeholders to match the grey borders */
    .placeholder {
        position: absolute;
        width: 140px;
        height: 140px;
        border: 6px solid #999;
        border-radius: 8px;
        background-color: white;
        object-fit: cover;
        box-sizing: border-box;
    }

    /* Positioning the placeholders */
    #ph-left { top: 50%; left: 5%; transform: translateY(-50%); }
    #ph-top-left { top: 5%; left: 30%; }
    #ph-top-right { top: 5%; right: 30%; }
    #ph-right { top: 50%; right: 5%; transform: translateY(-50%); }

    /* The green gradient trail */
    .trail {
        position: absolute;
        top: 50%;
        left: calc(5% + 140px); /* Starts right after the left placeholder */
        width: calc(45% - 140px); /* Stretches to the center head */
        height: 100px;
        transform: translateY(-50%);
        background: linear-gradient(to right, rgba(50, 200, 150, 0), rgba(50, 180, 130, 0.9));
        z-index: 1;
    }

    /* Container for the head to keep it centered while rotating */
    .head-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 120px;
        height: 120px;
        z-index: 2;
    }

    /* The Head styling */
    .head {
        width: 100%;
        height: 100%;
        border: 4px solid black;
        background-color: white;
        border-radius: 4px;
        position: relative;
        box-sizing: border-box;
        /* Will be rotated by JS */
        transform-origin: center center; 
    }

    /* Drawing the face */
    .eye {
        position: absolute;
        width: 10px;
        height: 10px;
        background: black;
        border-radius: 50%;
        top: 35%;
    }
    .eye.left { left: 30%; }
    .eye.right { right: 30%; }
    
    .mouth {
        position: absolute;
        bottom: 25%;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 15px;
        border-bottom: 4px solid black;
        border-radius: 0 0 40px 40px;
    }

    /* Recreating the bottom decorative logo */
    .bottom-logo {
        position: absolute;
        bottom: 5%;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Making a rough approximation of the geometric logo */
    .bottom-logo::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border: 4px solid transparent;
        border-top: 4px solid #aaa;
        border-bottom: 4px solid #aaa;
        transform: rotate(45deg);
    }
    .bottom-logo::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        border: 4px solid transparent;
        border-left: 4px solid #aaa;
        border-right: 4px solid #aaa;
        transform: rotate(45deg);
    }
    .logo-dot {
        width: 16px;
        height: 16px;
        background-color: #aaa;
        border-radius: 50%;
        z-index: 3;
    }

</style>
</head>
<body>

<div class="container">
    <div class="trail"></div>

    <img src="https://via.placeholder.com/140/ffffff/555555?text=Place+holder" class="placeholder" id="ph-left" alt="Left Placeholder">
    <img src="https://via.placeholder.com/140/ffffff/555555?text=Place+holder" class="placeholder" id="ph-top-left" alt="Top Left Placeholder">
    <img src="https://via.placeholder.com/140/ffffff/555555?text=Place+holder" class="placeholder" id="ph-top-right" alt="Top Right Placeholder">
    <img src="https://via.placeholder.com/140/ffffff/555555?text=Place+holder" class="placeholder" id="ph-right" alt="Right Placeholder">

    <div class="head-container" id="head-container">
        <div class="head" id="head">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
        </div>
    </div>

    <div class="bottom-logo">
        <div class="logo-dot"></div>
    </div>
</div>

<script>
    const head = document.getElementById('head');
    const headContainer = document.getElementById('head-container');

    document.addEventListener('mousemove', (e) => {
        // Get the position of the head container relative to the viewport
        const rect = headContainer.getBoundingClientRect();
        
        // Calculate the absolute center coordinates of the head
        const headCenterX = rect.left + (rect.width / 2);
        const headCenterY = rect.top + (rect.height / 2);
        
        // Calculate the distance from the head's center to the mouse cursor
        const deltaX = e.clientX - headCenterX;
        const deltaY = e.clientY - headCenterY;
        
        // Calculate the angle using atan2 (returns radians)
        const angleRadians = Math.atan2(deltaY, deltaX);
        
        // Convert radians to degrees. 
        // We add 90 degrees because the face is drawn pointing "up" (0 degrees standard rotation),
        // but atan2 assumes 0 degrees is pointing right along the X-axis.
        const angleDegrees = (angleRadians * (180 / Math.PI)) + 90;
        
        // Apply the rotation dynamically
        head.style.transform = `rotate(${angleDegrees}deg)`;
    });
</script>

</body>
</html>
