<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Place holder layout</title>
<style>
  :root{
    --teal: #2bc7a3;
    --teal-dark: #1fae8d;
    --ink: #111111;
    --text-gray: #9a9a9a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: #ffffff;
    font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    width: 92vw;
    max-width: 1280px;
    aspect-ratio: 1280 / 720;
  }

  /* ---------- placeholder image-buttons ---------- */
  .placeholder-btn {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.05;
    padding: 0;
    margin: 0;
    background: #ffffff;
    color: var(--text-gray);
    font-size: clamp(14px, 2.4vw, 32px);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .18s ease, box-shadow .18s ease;
    box-shadow: 0 0 0 0 rgba(0,0,0,0);
    z-index: 3;
  }

  .placeholder-btn::before{
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 6px;
    padding: 5px;
    background: linear-gradient(135deg, #e3e3e3 0%, #b9b9b9 45%, #7e7e7e 100%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  .placeholder-btn span { position: relative; z-index: 1; }

  .placeholder-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 22px rgba(0,0,0,.16); }
  .placeholder-btn:active { transform: translateY(-1px); }
  .placeholder-btn:focus-visible { outline: 3px solid var(--teal); outline-offset: 3px; }

  #ph-top1   { left: 28.4%; top: 0%;     width: 18.0%; height: 31.7%; }
  #ph-top2   { left: 53.7%; top: 0%;     width: 18.0%; height: 31.7%; }
  #ph-left   { left: 2.9%;  top: 33.6%;  width: 17.6%; height: 31.7%; }
  #ph-right  { left: 79.4%; top: 33.6%;  width: 17.8%; height: 31.7%; }

  .placeholder-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .placeholder-btn img.uploaded {
    position: absolute; inset: 6px; width: calc(100% - 12px); height: calc(100% - 12px);
    object-fit: cover; border-radius: 4px; z-index: 1; display: none;
  }

  /* ---------- spotlight beam: pivots from the left box and points at the cursor ---------- */
  .beam {
    position: absolute;
    transform-origin: left center;
    background: linear-gradient(to right, rgba(43,199,163,0) 0%, rgba(43,199,163,.5) 55%, var(--teal) 100%);
    border-radius: 999px;
    z-index: 1;
    pointer-events: none;
    transition: width .09s ease-out, transform .09s ease-out, opacity .3s ease;
    opacity: 0;
  }

  .beam-tip {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 18px 6px rgba(43,199,163,.75);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    transition: left .09s ease-out, top .09s ease-out, opacity .3s ease;
    opacity: 0;
  }

  /* ---------- head (box stays put — only the eyes move) ---------- */
  .head {
    position: absolute;
    left: 43.75%;
    top: 38.3%;
    width: 12.7%;
    height: 22.8%;
    background: #ffffff;
    border: 5px solid var(--ink);
    border-radius: 2px;
    z-index: 2;
    overflow: visible;
  }
  .head svg { display: block; width: 100%; height: 100%; }
  .mouth { stroke: var(--ink); stroke-width: 6; fill: none; stroke-linecap: round; }

  .eye {
    position: absolute;
    width: 9%;
    height: 9%;
    top: 33%;
    border-radius: 50%;
    background: var(--ink);
    transition: transform .08s ease-out;
    will-change: transform;
  }
  #eyeL { left: 27%; }
  #eyeR { left: 63%; }

  /* ---------- bottom mark ---------- */
  .mark { position: absolute; left: 50%; top: 88%; width: 6.2%; transform: translateX(-50%); }

  @media (max-width: 640px) {
    .placeholder-btn { font-size: 4.6vw; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <button class="placeholder-btn" id="ph-top1" type="button" title="Choose image">
    <span>Place<br>holder</span>
    <input type="file" accept="image/*" aria-label="Upload image">
    <img class="uploaded" alt="">
  </button>

  <button class="placeholder-btn" id="ph-top2" type="button" title="Choose image">
    <span>Place<br>holder</span>
    <input type="file" accept="image/*" aria-label="Upload image">
    <img class="uploaded" alt="">
  </button>

  <button class="placeholder-btn" id="ph-left" type="button" title="Choose image">
    <span>Place<br>holder</span>
    <input type="file" accept="image/*" aria-label="Upload image">
    <img class="uploaded" alt="">
  </button>

  <div class="beam" id="beam" aria-hidden="true"></div>
  <div class="beam-tip" id="beamTip" aria-hidden="true"></div>

  <div class="head" id="head" aria-hidden="true">
    <svg viewBox="0 0 160 160">
      <path class="mouth" d="M 48 96 Q 80 122 112 96"></path>
    </svg>
    <div class="eye" id="eyeL"></div>
    <div class="eye" id="eyeR"></div>
  </div>

  <button class="placeholder-btn" id="ph-right" type="button" title="Choose image">
    <span>Place<br>holder</span>
    <input type="file" accept="image/*" aria-label="Upload image">
    <img class="uploaded" alt="">
  </button>

  <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
    <g stroke="#9a9a9a" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M30 12 L18 24"></path>
      <path d="M70 12 L82 24"></path>
      <path d="M30 88 L18 76"></path>
      <path d="M70 88 L82 76"></path>
      <path d="M22 32 L14 32"></path>
      <path d="M78 32 L86 32"></path>
      <path d="M22 68 L14 68"></path>
      <path d="M78 68 L86 68"></path>
    </g>
    <rect x="36" y="36" width="28" height="28" rx="5" transform="rotate(45 50 50)" fill="#b0b0b0"></rect>
    <circle cx="50" cy="50" r="6" fill="#ffffff"></circle>
  </svg>

</div>

<script>
  const stage   = document.getElementById('stage');
  const head    = document.getElementById('head');
  const eyeL    = document.getElementById('eyeL');
  const eyeR    = document.getElementById('eyeR');
  const beam    = document.getElementById('beam');
  const beamTip = document.getElementById('beamTip');

  // the beam is anchored at the HEAD'S OWN CENTER, so no matter which way it
  // swings, the inner portion is covered by the head box and it always reads
  // as "coming out of" the head — i.e. it stays connected to it.
  const PIVOT_X_RATIO = 0.5011; // head center, horizontally
  const PIVOT_Y_RATIO = 0.497;  // head center, vertically
  const BEAM_THICKNESS_RATIO = 0.228; // same height as the head, like the original art
  const BEAM_DEFAULT_LEN_RATIO = 0.296; // resting length, reaches the left placeholder by default
  const BEAM_MIN_LEN_RATIO = 0.07;
  const BEAM_MAX_LEN_RATIO = 0.68;

  let hasMoved = false;

  function placeDefaultBeam(){
    const r = stage.getBoundingClientRect();
    beam.style.left   = (r.width * PIVOT_X_RATIO) + 'px';
    beam.style.top    = (r.height * PIVOT_Y_RATIO) + 'px';
    beam.style.height = (r.height * BEAM_THICKNESS_RATIO) + 'px';
    beam.style.width  = (r.width * BEAM_DEFAULT_LEN_RATIO) + 'px';
    beam.style.transform = 'translateY(-50%) rotate(180deg)';
  }

  function updateBeamAndGaze(clientX, clientY){
    const r = stage.getBoundingClientRect();

    // ---- beam: pivot stays at the head's center, it swings + reaches toward the cursor ----
    const pivotX = r.left + r.width * PIVOT_X_RATIO;
    const pivotY = r.top + r.height * PIVOT_Y_RATIO;
    const bdx = clientX - pivotX;
    const bdy = clientY - pivotY;
    const angle = Math.atan2(bdy, bdx);
    const rawDist = Math.hypot(bdx, bdy);
    const minLen = r.width * BEAM_MIN_LEN_RATIO;
    const maxLen = r.width * BEAM_MAX_LEN_RATIO;
    const len = Math.max(minLen, Math.min(rawDist, maxLen));

    const localPivotX = r.width * PIVOT_X_RATIO;
    const localPivotY = r.height * PIVOT_Y_RATIO;

    beam.style.left   = localPivotX + 'px';
    beam.style.top    = localPivotY + 'px';
    beam.style.height = (r.height * BEAM_THICKNESS_RATIO) + 'px';
    beam.style.width  = len + 'px';
    beam.style.transform = `translateY(-50%) rotate(${angle}rad)`;
    beam.style.opacity = '1';

    const tipX = localPivotX + Math.cos(angle) * len;
    const tipY = localPivotY + Math.sin(angle) * len;
    beamTip.style.left = tipX + 'px';
    beamTip.style.top  = tipY + 'px';
    beamTip.style.opacity = '1';

    // ---- gaze: the head box never moves, only the eyes drift toward the cursor ----
    const hr = head.getBoundingClientRect();
    const hcx = hr.left + hr.width / 2;
    const hcy = hr.top + hr.height / 2;
    const gdx = clientX - hcx;
    const gdy = clientY - hcy;
    const gAngle = Math.atan2(gdy, gdx);
    const gDist = Math.hypot(gdx, gdy);
    const maxOffset = hr.width * 0.11;
    const amount = Math.min(gDist / 220, 1) * maxOffset;
    const ox = Math.cos(gAngle) * amount;
    const oy = Math.sin(gAngle) * amount;
    eyeL.style.transform = `translate(${ox}px, ${oy}px)`;
    eyeR.style.transform = `translate(${ox}px, ${oy}px)`;
  }

  function handleMove(x, y){
    hasMoved = true;
    updateBeamAndGaze(x, y);
  }

  window.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
  window.addEventListener('touchmove', e => {
    if (e.touches && e.touches[0]) handleMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });

  window.addEventListener('resize', () => { if (!hasMoved) placeDefaultBeam(); });

  placeDefaultBeam();

  // ---- placeholders act as image-pick buttons ----
  document.querySelectorAll('.placeholder-btn').forEach(btn => {
    const input = btn.querySelector('input[type="file"]');
    const img = btn.querySelector('img.uploaded');
    const label = btn.querySelector('span');
    input.addEventListener('change', () => {
      const file = input.files && input.files[0];
      if (!file) return;
      img.src = URL.createObjectURL(file);
      img.style.display = 'block';
      label.style.display = 'none';
    });
  });
</script>

</body>
</html>
