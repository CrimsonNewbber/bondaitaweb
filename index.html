<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cursor Selector</title>
<style>
  :root{
    --bg:#efefef;
    --frame:#9f9f9f;
    --trail: rgba(80, 255, 190, 0.75);
    --trail2: rgba(80, 255, 190, 0.02);
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: var(--bg);
    font-family: Arial, Helvetica, sans-serif;
  }

  .option {
    position: absolute;
    width: 180px;
    height: 180px;
    border: 8px solid var(--frame);
    border-radius: 10px;
    background: white;
    box-sizing: border-box;
    box-shadow: 0 2px 0 rgba(0,0,0,.05);
    object-fit: cover;
  }

  #top1 { left: 330px; top: 22px; }
  #top2 { left: 760px; top: 22px; }
  #left { left: 40px; top: 255px; }
  #right { right: 40px; top: 255px; }

  #trail {
    position: absolute;
    height: 96px;
    width: 260px;
    border-radius: 0 48px 48px 0;
    background: linear-gradient(90deg, var(--trail2), var(--trail));
    transform-origin: left center;
    pointer-events: none;
    filter: blur(0.2px);
  }

  #head {
    position: absolute;
    width: 120px;
    height: 120px;
    background: #fff;
    border: 5px solid #000;
    border-radius: 4px;
    box-sizing: border-box;
    pointer-events: none;
    transform-origin: center center;
    box-shadow: 0 2px 0 rgba(0,0,0,.05);
  }

  .eye {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #000;
    border-radius: 50%;
    top: 36px;
  }
  #e1 { left: 34px; }
  #e2 { right: 34px; }

  #mouth {
    position: absolute;
    left: 31px;
    top: 63px;
    width: 54px;
    height: 28px;
    border-bottom: 6px solid #000;
    border-radius: 0 0 60px 60px;
  }

  /* pointer arrow inside the head */
  #pointer {
    position: absolute;
    left: 50%;
    top: 13px;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 14px solid #000;
    transform-origin: 50% 36px;
    transform: translateX(-50%) rotate(0deg);
  }

  #hint {
    position: absolute;
    left: 14px;
    top: 10px;
    font-size: 14px;
    color: #444;
    user-select: none;
  }
</style>
</head>
<body>

<div id="hint">Move your mouse — the head points to it.</div>

<img class="option" id="top1" alt="placeholder 1" />
<img class="option" id="top2" alt="placeholder 2" />
<img class="option" id="left" alt="placeholder 3" />
<img class="option" id="right" alt="placeholder 4" />

<div id="trail"></div>

<div id="head">
  <div id="pointer"></div>
  <div class="eye" id="e1"></div>
  <div class="eye" id="e2"></div>
  <div id="mouth"></div>
</div>

<script>
  // Inline SVG placeholders (no broken image icons)
  const placeholderSVG = (label) => `
    <svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
      <rect x="0" y="0" width="180" height="180" rx="6" fill="#fff"/>
      <rect x="0" y="0" width="180" height="180" rx="6" fill="none" stroke="#a6a6a6" stroke-width="8"/>
      <g transform="translate(47,42)" fill="none" stroke="#c1c1c1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="86" height="56" rx="3"/>
        <circle cx="63" cy="18" r="8" fill="#c1c1c1" stroke="none"/>
        <path d="M2 54 L27 28 L45 47 L58 35 L84 54"/>
      </g>
      <text x="90" y="128" text-anchor="middle" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#6f6f6f">Place</text>
      <text x="90" y="160" text-anchor="middle" font-size="30" font-family="Arial, Helvetica, sans-serif" fill="#6f6f6f">holder</text>
    </svg>
  `;

  const makeDataURL = (svg) =>
    'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);

  document.getElementById('top1').src = makeDataURL(placeholderSVG('1'));
  document.getElementById('top2').src = makeDataURL(placeholderSVG('2'));
  document.getElementById('left').src  = makeDataURL(placeholderSVG('3'));
  document.getElementById('right').src = makeDataURL(placeholderSVG('4'));

  const head = document.getElementById('head');
  const trail = document.getElementById('trail');
  const pointer = document.getElementById('pointer');

  // Start position near center
  let hx = window.innerWidth * 0.45;
  let hy = window.innerHeight * 0.42;
  let tx = hx;
  let ty = hy;

  let mouseX = hx;
  let mouseY = hy;

  function render() {
    // Smooth follow
    hx += (mouseX - hx) * 0.12;
    hy += (mouseY - hy) * 0.12;

    const dx = mouseX - hx;
    const dy = mouseY - hy;
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;

    // Head position
    head.style.left = (hx - 60) + 'px';
    head.style.top  = (hy - 60) + 'px';

    // Point the arrow toward the cursor
    pointer.style.transform = `translateX(-50%) rotate(${angle}deg)`;

    // Trail from previous point to current point
    const dist = Math.hypot(hx - tx, hy - ty);
    const trailAngle = Math.atan2(hy - ty, hx - tx) * 180 / Math.PI;

    trail.style.left = tx + 'px';
    trail.style.top = (ty - 48) + 'px';
    trail.style.width = Math.max(120, dist) + 'px';
    trail.style.transform = `rotate(${trailAngle}deg)`;

    // Update trail start for next frame
    tx += (hx - tx) * 0.22;
    ty += (hy - ty) * 0.22;

    requestAnimationFrame(render);
  }

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Touch support
  document.addEventListener('touchmove', (e) => {
    if (!e.touches.length) return;
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
  }, { passive: true });

  render();
</script>

</body>
</html>
